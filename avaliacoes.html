<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-i18n="title_avaliacoes">⭐ Avaliações - VIP Android</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body {
      background-color: #0f0f1a;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      color: #fff;
    }

    .topo {
      background-color: #111;
      padding: 10px 20px;
      display: flex;
      align-items: center;
    }

    .logo-topo {
      height: 40px;
    }

    .barra-superior {
      display: flex;
      align-items: center;
      background-color: #1d1d3c;
      padding: 10px 20px;
      position: sticky;
      top: 0;
      z-index: 999;
    }

    .barra-superior h1 {
      flex-grow: 1;
      text-align: center;
      font-size: 20px;
      color: #00ccff;
      margin: 0;
    }

    .barra-superior button {
      background-color: #00ccff;
      border: none;
      border-radius: 6px;
      color: #111;
      padding: 6px 12px;
      cursor: pointer;
      font-weight: bold;
    }

    .botao-voltar {
      background-color: #ff4d4d;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 18px;
      cursor: pointer;
      font-weight: bold;
      margin: 20px auto;
      display: block;
    }

    .menu-lateral {
      position: fixed;
      top: 0;
      left: -250px;
      width: 250px;
      height: 100%;
      background-color: #111;
      color: #fff;
      padding: 20px;
      transition: left 0.3s ease;
      z-index: 1000;
    }

    .menu-lateral ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .menu-lateral ul li {
      margin: 20px 0;
    }

    .menu-lateral ul li a {
      color: #fff;
      text-decoration: none;
      font-size: 16px;
    }

    .menu-lateral.ativo {
      left: 0;
    }

    .avaliacoes-container {
      max-width: 700px;
      margin: 20px auto;
      background: #1d1d3c;
      padding: 20px;
      border-radius: 10px;
      color: white;
    }

    .avaliacoes-container h2 {
      text-align: center;
      color: #00ccff;
    }

    .estrelas input {
      display: none;
    }

    .estrelas label {
      font-size: 28px;
      color: #888;
      cursor: pointer;
      transition: color 0.2s;
    }

    .estrelas input:checked ~ label,
    .estrelas label:hover,
    .estrelas label:hover ~ label {
      color: gold;
    }

    textarea, input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
    }

    button.enviar-avaliacao {
      margin-top: 12px;
      padding: 10px 20px;
      background-color: #00ccff;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      color: #111;
      width: 100%;
      transition: background-color 0.3s;
    }

    button.enviar-avaliacao:hover {
      background-color: #0099cc;
    }

    .comentarios {
      margin-top: 30px;
    }

    .comentario {
      background: #2c2c5c;
      padding: 12px 15px;
      margin-bottom: 12px;
      border-radius: 8px;
      position: relative;
    }

    .comentario strong {
      color: #00ccff;
    }

    .comentario .estrelas span {
      color: gold;
      font-size: 20px;
      margin-right: 2px;
    }
  </style>
</head>
<body>
  <!-- TOPO -->
  <div class="topo">
    <img src="imagens/logo.png" class="logo-topo" alt="Logo" />
  </div>

  <!-- BARRA SUPERIOR -->
  <div class="barra-superior">
    <h1 data-i18n="avaliacoes">⭐ Avaliações</h1>
    <button id="menuBotao" class="menu" data-i18n="menu">☰</button>
  </div>

  <!-- MENU LATERAL -->
  <nav class="menu-lateral oculto">
    <ul>
      <li><a href="index.html" data-i18n="inicio">🏠 Início</a></li>
      <li><a href="avaliacoes.html" data-i18n="avaliacoes">⭐ Avaliações</a></li>
      <li><a href="logout.html" data-i18n="sair">🚪 Sair</a></li>
    </ul>
  </nav>

  <!-- BOTÃO VOLTAR FIXO -->
  <button class="botao-voltar" onclick="location.href='index.html'">← Voltar para Início</button>

  <!-- CONTAINER DE AVALIAÇÕES -->
  <main class="avaliacoes-container">
    <h2 data-i18n="deixe_sua_avaliacao">Deixe sua Avaliação</h2>
    <form id="formAvaliacao">
      <div class="estrelas" id="estrelaContainer">
        <input type="radio" name="estrela" id="estrela5" value="5"><label for="estrela5">★</label>
        <input type="radio" name="estrela" id="estrela4" value="4"><label for="estrela4">★</label>
        <input type="radio" name="estrela" id="estrela3" value="3"><label for="estrela3">★</label>
        <input type="radio" name="estrela" id="estrela2" value="2"><label for="estrela2">★</label>
        <input type="radio" name="estrela" id="estrela1" value="1"><label for="estrela1">★</label>
      </div>
      <textarea id="comentario" rows="4" placeholder="Escreva seu comentário..." required data-i18n-placeholder="escreva_comentario"></textarea>
      <input type="text" id="nomeCliente" placeholder="Seu nome (opcional)" data-i18n-placeholder="seu_nome_opcional">
      <button type="submit" class="enviar-avaliacao" data-i18n="enviar_avaliacao">Enviar Avaliação</button>
    </form>

    <div class="comentarios" id="listaAvaliacoes">
      <h3 style="margin-top: 30px;" data-i18n="avaliacoes_recentes">📣 Avaliações Recentes</h3>
      <!-- Avaliações aparecerão aqui -->
    </div>
  </main>
  
  <script src="/js/global.js" defer></script>
  <script type="module" src="/js/avaliacoes.js"></script>
  <script src="/js/menu.js"></script>
</body>
</html>
