<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-i18n="title">Carrinho de Compras</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    /* Estilo dos produtos no carrinho */
    .produto-card {
      display: flex;
      align-items: center;
      background-color: #1d1d3c;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
      color: #fff;
      padding: 10px;
      gap: 14px;
      margin: 16px 20px;
      position: relative;
    }
    .produto-card img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      background-color: #fff;
      border-radius: 8px;
      cursor: pointer;
    }
    .produto-info {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      flex: 1;
      background-color: white;
      border-radius: 8px;
      padding: 12px;
    }
    .produto-info h3 {
      font-size: 16px;
      font-weight: bold;
      color: #000;
      margin: 0 0 4px;
    }
    .produto-info p {
      margin: 2px 0;
      font-size: 14px;
    }
    .frete { color: #00e676; }
    .descricao-extra { color: #cdc009; }
    .preco-ant { text-decoration: line-through; color: #888; }
    .preco-oferta { color: #ff4d4d; font-weight: bold; }
    .preco { color: #1a8cff; font-weight: bold; }
    .subtotal-final {
      font-size: 22px;
      font-weight: bold;
      color: #00e676;
      text-align: center;
      margin: 30px 0 10px;
    }

    /* Modal de zoom de imagem */
    #modalImagem {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }
    #modalImagem img {
      max-width: 90%;
      max-height: 90%;
    }

    /* Modal de confirmação customizado */
    #modalConfirm {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    #modalConfirm .modal-content {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      max-width: 300px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    #modalConfirm button {
      margin: 10px 5px 0 5px;
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    #modalConfirm .btnSim { background: #00ccff; color: #000; }
    #modalConfirm .btnNao { background: #ff3333; color: #fff; }
  </style>
</head>
<body>

  <!-- Frete Grátis no topo -->
  <div style="text-align: center; margin-top: 20px;">
    <img src="imagens/frete-gratis.png" alt="Frete Grátis" data-i18n-alt="frete_gratis" style="width: 170px;" />
  </div>

  <!-- Container do Carrinho -->
  <main id="carrinhoContainer" class="produtos-container" style="margin-top: 30px;"></main>

  <!-- Subtotal Final -->
  <div id="subtotalFinal" class="subtotal-final" data-i18n="subtotal_final">Subtotal Final</div>

  <!-- Imagem Melhor Preço -->
  <div style="text-align: right; margin: 40px 30px 20px;">
    <img src="imagens/melhor-preco.png" alt="Melhor Preço" data-i18n-alt="melhor_preco" style="width: 170px;" />
  </div>

  <!-- Botões de Ação -->
  <div style="text-align: center; margin-bottom: 30px;">
    <button class="finalizar-btn" onclick="prosseguirComACompra()"
      style="font-size:18px;padding:12px 28px;background:#00ccff;border:none;border-radius:8px;cursor:pointer;font-weight:bold;color:#000;"
      data-i18n="prosseguir_compra">
      🛒 Prosseguir com a Compra
    </button>
    <br/><br/>
    <button onclick="voltarDetalhes()" style="padding:10px 20px;font-size:16px;" data-i18n="voltar">⬅ Voltar</button>
  </div>

  <!-- Modal de zoom de imagem -->
  <div id="modalImagem">
    <img id="imagemAmpliada" src="" />
  </div>

  <!-- Modal de confirmação -->
  <div id="modalConfirm">
    <div class="modal-content">
      <p id="mensagemConfirm" data-i18n="mensagem_confirm">Mensagem de confirmação</p>
      <button class="btnSim" id="btnSim" data-i18n="sim">Sim</button>
      <button class="btnNao" id="btnNao" data-i18n="nao">Não</button>
    </div>
  </div>

  <!-- Carrinho flutuante -->
  <div id="cartFloat" class="oculto" data-i18n="ver_carrinho">🛒 Ver Carrinho</div>
  
  <script defer src="/js/global.js"></script>
  <script type="module" src="/js/carrinho.js"></script>
  <script>
    // Fecha o modal de zoom ao clicar fora
    document.getElementById('modalImagem').addEventListener('click', () => {
      document.getElementById('modalImagem').style.display = 'none';
    });

    // Função de voltar para index.html
    function voltarDetalhes() {
      window.location.href = "index.html";
    }

    // Função de prosseguir com a compra
    function prosseguirComACompra() {
      window.location.href = "confirmacao.html";
    }

    // Função para exibir modal de confirmação
    function mostrarConfirmacao(mensagem, callbackSim) {
      const modal = document.getElementById("modalConfirm");
      const msg = document.getElementById("mensagemConfirm");
      const btnSim = document.getElementById("btnSim");
      const btnNao = document.getElementById("btnNao");

      msg.textContent = mensagem;
      modal.style.display = "flex";

      btnSim.onclick = () => {
        callbackSim();
        modal.style.display = "none";
      };

      btnNao.onclick = () => {
        modal.style.display = "none";
      };
    }

    // Substituindo confirm() por modal customizado
    window.confirmarRemoverUm = function(index) {
      mostrarConfirmacao("Você tem certeza que deseja remover uma unidade deste item?", () => {
        const carrinho = JSON.parse(localStorage.getItem('vipandroid_checkout')) || [];
        if (carrinho[index].quantidade > 1) {
          carrinho[index].quantidade -= 1;
        } else {
          carrinho.splice(index, 1);
        }
        localStorage.setItem('vipandroid_checkout', JSON.stringify(carrinho));
        carregarCarrinho();
      });
    };

    window.confirmarRemoverTudo = function(index) {
      mostrarConfirmacao("Você tem certeza que deseja remover este item do carrinho?", () => {
        const carrinho = JSON.parse(localStorage.getItem('vipandroid_checkout')) || [];
        carrinho.splice(index, 1);
        localStorage.setItem('vipandroid_checkout', JSON.stringify(carrinho));
        carregarCarrinho();
      });
    };
  </script>
</body>
</html>
