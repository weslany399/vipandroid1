<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carrinho de Compras</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* — SEU CSS ORIGINAL: */
    .produto-card {
      display: flex;
      align-items: center;
      background-color: #1d1d3c;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
      color: #fff;
      padding: 10px;
      gap: 14px;
      margin: 16px 20px;
      position: relative;
    }
    .produto-card img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      background-color: #fff;
      border-radius: 8px;
      cursor: pointer;
    }
    .produto-info {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      flex: 1;
      background-color: white;
      border-radius: 8px;
      padding: 12px;
    }
    .produto-info h3 {
      font-size: 16px;
      font-weight: bold;
      color: #000;
      margin: 0 0 4px;
    }
    .produto-info p {
      margin: 2px 0;
      font-size: 14px;
    }
    .frete {
      color: #00e676;
    }
    .descricao-extra {
      color: #cdc009;
    }
    .preco-ant {
      text-decoration: line-through;
      color: #888;
    }
    .preco-oferta {
      color: #ff4d4d;
      font-weight: bold;
    }
    .preco {
      color: #1a8cff;
      font-weight: bold;
    }
    .subtotal-final {
      font-size: 22px;
      font-weight: bold;
      color: #00e676;
      text-align: center;
      margin: 30px 0 10px;
    }
    .remover-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background-color: #ff3333;
      color: white;
      border: none;
      border-radius: 5px;
      padding: 4px 8px;
      font-size: 16px;
      cursor: pointer;
    }

    /* — NOVO: Modal de zoom de imagem — */
    #modalImagem {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }
    #modalImagem img {
      max-width: 90%;
      max-height: 90%;
    }
  </style>
</head>
<body>

  <!-- Frete Grátis no topo -->
  <div style="text-align: center; margin-top: 20px;">
    <img src="imagens/frete-gratis.png" alt="Frete Grátis" style="width: 170px;" />
  </div>

  <!-- Container do Carrinho -->
  <main id="carrinhoContainer" class="produtos-container" style="margin-top: 30px;"></main>

  <!-- Subtotal Final -->
  <div id="subtotalFinal" class="subtotal-final"></div>

  <!-- Imagem Melhor Preço -->
  <div style="text-align: right; margin: 40px 30px 20px;">
    <img src="imagens/melhor-preco.png" alt="Melhor Preço" style="width: 170px;" />
  </div>

  <!-- Botões de Ação -->
  <div style="text-align: center; margin-bottom: 30px;">
    <button class="finalizar-btn" onclick="prosseguirComACompra()"
      style="font-size:18px;padding:12px 28px;background:#00ccff;border:none;border-radius:8px;cursor:pointer;font-weight:bold;color:#000;">
      🛒 Prosseguir com a Compra
    </button>
    <br/><br/>
    <button onclick="voltarDetalhes()" style="padding:10px 20px;font-size:16px;">⬅ Voltar</button>
  </div>

  <!-- Modal de imagem -->
  <div id="modalImagem">
    <img id="imagemAmpliada" src="" />
  </div>

  <!-- Carrinho flutuante -->
  <div id="cartFloat" class="oculto">🛒 Ver Carrinho</div>

  <script type="module" src="js/carrinho.js"></script>
  <script>
    // Fecha o modal ao clicar fora da imagem
    document.getElementById('modalImagem').addEventListener('click', () => {
      document.getElementById('modalImagem').style.display = 'none';
    });
  </script>
</body>
</html>
