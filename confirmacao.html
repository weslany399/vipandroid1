<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="confirma_compra_titulo">Confirmação da Compra</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    * {margin:0;padding:0;box-sizing:border-box;}
    body {font-family:'Segoe UI',Arial,sans-serif;background-color:#030348;color:#fff;min-height:100vh;padding:140px 20px 40px 20px;overflow-x:hidden;}
    h1 {text-align:center;margin-bottom:30px;color:#00ccff;}
    form {max-width:700px;margin:auto;background-color:#1d1d3c;padding:20px;border-radius:12px;box-shadow:0 0 10px #00ccff;}
    .campo {margin-bottom:16px;}
    label {display:block;margin-bottom:6px;font-weight:bold;color:#00ffcc;}
    input {width:100%;padding:10px;border:none;border-radius:6px;font-size:16px;background-color:#2a2a5e;color:#fff;}
    input::placeholder {color:#ccc;}
    .grupo-endereco {display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}
    .formas-pagamento {text-align:center;margin-top:30px;}
    .formas-pagamento h2 {margin-bottom:12px;font-size:20px;color:#00ccff;}
    .formas {display:flex;justify-content:center;gap:30px;flex-wrap:wrap;}
    .forma {text-align:center;}
    .forma img {width:80px;height:80px;margin-top:6px;}
    .botoes {display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-top:30px;}
    .botoes button {flex:1;padding:12px;font-size:16px;font-weight:bold;border:none;border-radius:8px;cursor:pointer;transition:0.3s;}
    .botoes .voltar {background-color:#ccc;color:#000;}
    .botoes .finalizar {background-color:#25d366;color:#fff;}
    .botoes .voltar:hover {background-color:#bbb;}
    .botoes .finalizar:hover {background-color:#1ebe5d;}
    #resumoCompra ul {margin-top:10px;padding-left:20px;}
    #resumoCompra li {margin-bottom:12px;list-style:disc;color:#fff;line-height:1.4;}
    @media (max-width:600px){body{padding-top:100px;}form{padding:16px;}.formas-pagamento img{width:60px;height:60px;}.botoes{flex-direction:column;}}
  </style>
</head>
<body>
  <h1 data-i18n="confirma_compra_titulo">Confirmação da Compra</h1>

  <form id="formConfirmacao">
    <div class="campo">
      <label for="nome" data-i18n="label_nome">Nome completo</label>
      <input type="text" id="nome" required />
    </div>

    <div class="grupo-endereco">
      <div class="campo">
        <label for="rua" data-i18n="label_rua">Rua</label>
        <input type="text" id="rua" required />
      </div>
      <div class="campo">
        <label for="bairro" data-i18n="label_bairro">Bairro</label>
        <input type="text" id="bairro" required />
      </div>
      <div class="campo">
        <label for="cidade" data-i18n="label_cidade">Cidade</label>
        <input type="text" id="cidade" required />
      </div>
      <div class="campo">
        <label for="numero" data-i18n="label_numero">Número</label>
        <input type="text" id="numero" required />
      </div>
      <div class="campo">
        <label for="complemento" data-i18n="label_complemento">Complemento</label>
        <input type="text" id="complemento" />
      </div>
      <div class="campo">
        <label for="referencia" data-i18n="label_referencia">Referência</label>
        <input type="text" id="referencia" />
      </div>
    </div>

    <div class="campo">
      <label for="telefone" data-i18n="label_telefone">Telefone</label>
      <input type="text" id="telefone" required />
    </div>

    <div id="resumoCompra" class="campo">
      <label data-i18n="label_produtos">Produtos Selecionados:</label>
      <ul id="listaProdutos"></ul>
    </div>

    <div class="formas-pagamento">
      <h2 data-i18n="formas_pagamento_titulo">Aceitamos as seguintes formas de pagamento:</h2>
      <div class="formas">
        <div class="forma">
          <strong data-i18n="forma_pix">PIX</strong><br />
          <img src="imagens/pix-icon.png" alt="Pix" />
        </div>
        <div class="forma">
          <strong data-i18n="forma_cartao_credito">Cartão de Crédito</strong><br />
          <img src="imagens/cartao-credito-icon.png" alt="Cartão de Crédito" />
        </div>
        <div class="forma">
          <strong data-i18n="forma_cartao_debito">Cartão de Débito</strong><br />
          <img src="imagens/cartao-debito-icon.png" alt="Cartão de Débito" />
        </div>
      </div>
    </div>

    <div class="botoes">
      <button type="button" class="voltar" id="btnVoltar" data-i18n="btn_voltar">Voltar</button>
      <button type="button" class="finalizar" id="btnFinalizar" data-i18n="btn_finalizar">
        Enviar pedido de compra via WhatsApp
      </button>
    </div>
  </form>
  
  <script src="/js/global.js" defer></script>
  <script src="/js/confirmacao.js" type="module"></script>
</body>
</html>
