<!DOCTYPE html> 
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="title_entrega">Andamento da Entrega - Vip Android</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1a8cff, #004d99);
      color: #fff;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      margin-bottom: 1rem;
      font-weight: 600;
      font-size: 2rem;
      text-align: center;
      text-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    #btnVoltar {
      background: #004d99;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.3s ease;
      margin-bottom: 1.5rem;
    }
    #btnVoltar:hover {
      background: #003366;
    }

    form {
      background: #007acc;
      padding: 1.5rem;
      border-radius: 10px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    label {
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 0.3rem;
      display: block;
      color: #e0e0e0;
    }

    input[type="text"] {
      padding: 0.7rem 1rem;
      font-size: 1.1rem;
      border-radius: 8px;
      border: none;
      outline: none;
      font-weight: 600;
    }

    button {
      background: #004d99;
      border: none;
      padding: 0.75rem;
      border-radius: 8px;
      color: #fff;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    button:hover {
      background: #003366;
    }

    .resultado {
      margin-top: 2rem;
      background: rgba(0,0,0,0.25);
      border-radius: 10px;
      padding: 1.5rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }

    .resultado h2 {
      margin-top: 0;
      font-weight: 600;
      text-align: center;
      text-shadow: 0 0 5px rgba(0,0,0,0.3);
    }

    .campo-info {
      margin: 0.5rem 0;
      font-size: 1rem;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .status-entrega {
      font-size: 28px;
      font-weight: 900;
      color: #c1f70f;
      margin: 12px 0;
      text-transform: uppercase;
      text-shadow: 0 0 8px #1a8cffaa;
      text-align: center;
    }

    .contato {
      margin-top: 2rem;
      text-align: center;
      font-weight: 600;
      font-size: 1rem;
      color: #f0f0f0;
      line-height: 1.6;
    }

    .btn-contato {
      display: inline-block;
      margin: 0.5rem 0.75rem;
      padding: 0.7rem 1.4rem;
      background: #28a745;
      color: white;
      font-weight: 700;
      font-size: 1rem;
      border-radius: 8px;
      text-decoration: none;
      box-shadow: 0 4px 8px rgba(0,0,0,0.25);
      transition: background 0.3s ease;
    }

    .btn-contato:hover {
      background: #1e7e34;
    }

    .erro {
      margin-top: 1rem;
      background: #cc0000cc;
      padding: 1rem;
      border-radius: 8px;
      color: white;
      font-weight: 700;
      text-align: center;
      max-width: 400px;
    }

    @media (max-width: 480px) {
      form, .resultado {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <h1 data-i18n="consulta_entrega">Consulta de Andamento da Entrega</h1>

  <button id="btnVoltar" onclick="window.location.href='index.html'" data-i18n="voltar_inicio">
    ← Voltar para o início
  </button>

  <form id="formCPF" autocomplete="off">
    <label for="cpfInput" data-i18n="digite_cpf">Digite seu CPF:</label>
    <input type="text" id="cpfInput" name="cpfInput" placeholder="Apenas números" data-i18n-placeholder="cpf_placeholder" maxlength="11" pattern="\d{11}" required />
    <button type="submit" data-i18n="consultar">Consultar</button>
  </form>

  <div id="resultado" class="resultado" style="display:none;">
    <h2 data-i18n="resultado_titulo">Resultado da Consulta</h2>
    <p class="campo-info" data-i18n="dados_entrega"></p>
    <p class="status-entrega" data-i18n="status_entrega"></p>
  </div>

  <div id="erro" class="erro" style="display:none;" data-i18n="erro_consulta">Erro: CPF não encontrado ou inválido.</div>

  <div class="contato" id="contato" style="display:none;">
    <p data-i18n="duvidas_contato">Em caso de dúvidas, entre em contato com:</p>
    <a href="https://wa.me/556892451530" target="_blank" class="btn-contato" data-i18n="contato_loja">Contato da Loja: +55 68 9245-1530</a>
    <a href="https://wa.me/556899147048" target="_blank" class="btn-contato" data-i18n="contato_proprietario">Número do Proprietário: +55 68 9914-7048</a>
  </div>

  <script src="/js/global.js" defer></script>
  <script type="module" src="/js/andamento.js"></script>
</body>
</html>
