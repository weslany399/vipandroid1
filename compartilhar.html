<!DOCTYPE html> 
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="page_title">Compartilhar App - Vip Android</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* Reset básico */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to bottom, #f5f7fa, #c3cfe2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      color: #333;
      padding: 20px;
    }

    h2 {
      font-size: 2.2rem;
      margin-bottom: 15px;
      color: #1a1a1a;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 30px;
      max-width: 400px;
      line-height: 1.6;
      color: #555;
    }

    button {
      background-color: #4f46e5;
      color: #fff;
      border: none;
      padding: 18px 40px;
      font-size: 1.2rem;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      margin-bottom: 15px;
    }

    button:hover {
      background-color: #4338ca;
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.25);
    }

    .secondary-button {
      background-color: #6b7280; /* cinza escuro */
    }

    .secondary-button:hover {
      background-color: #4b5563;
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.25);
    }

    @media (max-width: 500px) {
      button {
        width: 100%;
        padding: 15px 0;
        font-size: 1rem;
      }

      p {
        font-size: 1rem;
      }

      h2 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <h2 data-i18n="heading_share_app">📲 Compartilhe nosso Aplicativo</h2>
  <p data-i18n="paragraph_invite">Convide seus amigos para baixar o app Vip Android e aproveite as ofertas exclusivas!</p>

  <button onclick="compartilharApp()" data-i18n="button_share_now">Compartilhar Agora</button>
  <button class="secondary-button" onclick="window.location.href='index.html'" data-i18n="button_back_home">⬅️ Voltar ao Início</button>

  <script>
    function compartilharApp() {
      const titulo = "Vip Android - Loja de Celulares";
      const descricao = "Baixe agora nosso aplicativo e aproveite as ofertas exclusivas!";
      const link = "https://vip-android-746dd.web.app";

      if (navigator.share) {
        navigator.share({
          title: titulo,
          text: descricao,
          url: link
        })
        .then(() => console.log("✅ Compartilhado com sucesso!"))
        .catch(err => console.warn("❌ Erro:", err));
      } else {
        const whatsapp = `https://api.whatsapp.com/send?text=${encodeURIComponent(titulo + "\n" + descricao + "\n" + link)}`;
        window.open(whatsapp, "_blank");
      }
    }
  </script>

  <!-- Script global com defer -->
  <script src="/js/global.js" defer></script>
</body>
</html>
