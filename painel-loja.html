<!DOCTYPE html> 
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="title_cadastro">Cadastro de Acesso – Vip Android</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body {
      background-color: #030348;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }
    .container {
      max-width: 600px;
      margin: 80px auto 40px;
      background: #1c1c3c;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.5);
    }
    h2 {
      text-align: center;
      color: #00ccff;
      margin-bottom: 24px;
    }
    .link-topo {
      text-align: center;
      margin-bottom: 8px;
      font-size: 15px;
    }
    .link-topo a {
      color: #00ccff;
      font-weight: bold;
      text-decoration: underline;
    }
    .mensagem-baixo {
      text-align: center;
      margin-bottom: 40px;
      font-size: 15px;
      color: #dff30a;
    }
    form {
      display: grid;
      gap: 16px;
    }
    .linha-horizontal {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    label {
      font-weight: bold;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
    }
    .senha-container {
      position: relative;
    }
    .senha-container input {
      padding-right: 40px;
    }
    .toggle-senha {
      position: absolute;
      top: 50%;
      right: 12px;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-principal {
      background-color: #00ccff;
      color: #000;
    }
    .btn-principal:hover {
      background-color: #009acc;
    }
    .btn-voltar {
      background-color: #666;
      color: white;
      margin-top: 20px;
    }
    .btn-voltar:hover {
      background-color: #444;
    }
    .mensagem {
      margin-top: 18px;
      font-size: 15px;
      text-align: center;
    }
    .alerta-restricao {
      margin-top: 40px;
      text-align: center;
      font-size: 15px;
      color: #f1f108;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="link-topo">
      <span data-i18n="ja_cadastrou">Já se cadastrou?</span> 
      <a href="login-loja.html" data-i18n="clique_aqui">Clique aqui</a>
    </div>
    <div class="mensagem-baixo" data-i18n="preencha_formulario">
      Se não tem cadastro, preencha o formulário de acesso ⬇️
    </div>

    <h2 data-i18n="cadastro_acesso">Cadastro de Acesso</h2>

    <form id="formFunc">
      <div class="linha-horizontal">
        <div>
          <label data-i18n="nome_completo">Nome Completo</label>
          <input type="text" name="from_name" required placeholder="" data-i18n-placeholder="nome_completo_placeholder"/>
        </div>
        <div>
          <label data-i18n="cpf">CPF</label>
          <input type="text" name="cpf" required placeholder="" data-i18n-placeholder="cpf_placeholder"/>
        </div>
      </div>

      <div class="linha-horizontal">
        <div>
          <label data-i18n="email">E-mail</label>
          <input type="email" name="from_email" required placeholder="" data-i18n-placeholder="email_placeholder"/>
        </div>
        <div>
          <label data-i18n="telefone">Telefone</label>
          <input type="tel" name="phone" required placeholder="" data-i18n-placeholder="telefone_placeholder"/>
        </div>
      </div>

      <div>
        <label data-i18n="senha">Senha</label>
        <div class="senha-container">
          <input type="password" name="message" id="senha" required placeholder="" data-i18n-placeholder="senha_placeholder"/>
          <span class="toggle-senha" onclick="toggleSenha()" data-i18n="mostrar_senha">👁️</span>
        </div>
      </div>

      <button type="submit" class="btn-principal" data-i18n="cadastrar">Cadastrar</button>
    </form>

    <p id="msg" class="mensagem" data-i18n="mensagem"></p>

    <div class="alerta-restricao" data-i18n="alerta_restricao">
      Este painel só é permitido acesso para pessoas da loja ou proprietário
    </div>

    <button class="btn-voltar" onclick="location.href='index.html'" data-i18n="voltar_inicio">← Voltar ao Início</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script src="/js/painel-loja.js" type="module"></script>
  <script src="/js/global.js" defer></script>
  <script>
    function toggleSenha() {
      const input = document.getElementById("senha");
      input.type = input.type === "password" ? "text" : "password";
    }
  </script>
</body>
</html>
