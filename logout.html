<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sair do Sistema</title>
  <style>
    body {
      background: #030348;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 26px;
      color: #00ccff;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      margin-bottom: 30px;
    }

    .botoes {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    button {
      background-color: #00ccff;
      color: #000;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background-color: #009acc;
    }
  </style>
</head>
<body>
  <h1>Deseja realmente sair?</h1>
  <p>Se você confirmar, sua sessão será encerrada e você poderá fechar o app.</p>

  <div class="botoes">
    <button onclick="encerrarSessao()">✅ Sim, encerrar</button>
    <button onclick="window.location.href='home.html'">⬅ Não, voltar para a loja</button>
  </div>

  <script>
    function encerrarSessao() {
      // Limpa os dados de sessão/local
      localStorage.clear();
      sessionStorage.clear();

      // Exibe mensagem e instrução para fechar o app
      document.body.innerHTML = `
        <h1>Sessão encerrada com sucesso</h1>
        <p>Agora você pode <strong>fechar este app</strong> usando o botão de voltar ou deslizando ele na multitarefa do seu celular.</p>
        <p style="margin-top: 40px;">Obrigado por comprar conosco 💙</p>
      `;
    }
  </script>
</body>
</html>
